<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Login</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:Arial,Helvetica,sans-serif;
            background:linear-gradient(180deg,#f7faff 0%,#edf4ff 100%);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            color:#14213d;
        }
        .login-card{
            width:100%;
            max-width:460px;
            background:#fff;
            border:1px solid #dbe5f4;
            border-radius:28px;
            box-shadow:0 12px 32px rgba(20,33,61,.08);
            padding:34px 28px;
        }
        .badge{
            display:inline-block;
            background:#e8f0ff;
            color:#0d3fa5;
            padding:8px 14px;
            border-radius:999px;
            font-size:.88rem;
            font-weight:700;
            margin-bottom:14px;
        }
        h1{
            font-size:2rem;
            margin-bottom:8px;
        }
        .sub{
            color:#5b6b88;
            margin-bottom:22px;
        }
        .error-box{
            background:#fff0f0;
            border:1px solid #f2b8b8;
            color:#b42318;
            padding:12px 14px;
            border-radius:14px;
            margin-bottom:16px;
        }
        .form-group{margin-bottom:16px}
        label{
            display:block;
            font-weight:700;
            margin-bottom:8px;
        }
        input{
            width:100%;
            padding:14px 16px;
            border:1px solid #c9d7ee;
            border-radius:14px;
            font-size:1rem;
            outline:none;
        }
        input:focus{border-color:#1456d9}
        button{
            width:100%;
            border:none;
            background:#1456d9;
            color:#fff;
            padding:16px 18px;
            border-radius:16px;
            font-size:1rem;
            font-weight:700;
            cursor:pointer;
        }
        button:hover{background:#0d3fa5}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="badge">NGO PANEL</div>
        <h1>Welcome Back</h1>
        <p class="sub">Login to manage AASHRAY support requests.</p>

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
