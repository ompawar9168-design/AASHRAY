<script>
(function () {
    const callModal = document.getElementById("callModal");
    const receiveBtn = document.getElementById("receiveCallBtn");
    const dismissBtn = document.getElementById("dismissCallBtn");
    const msgBox = document.getElementById("callMessageBox");
    const spokenMessage = document.getElementById("spokenMessage");
    const callMedicineName = document.getElementById("callMedicineName");

    let activeReminderId = null;
    let modalOpen = false;
    let ringtoneAudio = null;

    function playRingtone() {
        stopRingtone();
        ringtoneAudio = new Audio("/static/audio/ringtone.mp3");
        ringtoneAudio.loop = true;
        ringtoneAudio.play().catch(err => {
            console.log("Ringtone play blocked or failed:", err);
        });
    }

    function stopRingtone() {
        if (ringtoneAudio) {
            ringtoneAudio.pause();
            ringtoneAudio.currentTime = 0;
            ringtoneAudio = null;
        }
    }

    function showModal(medicineName, message) {
        if (!callModal) return;

        callMedicineName.textContent = medicineName || "";
        spokenMessage.textContent = message || "It is time to take your tablet.";

        if (msgBox) {
            msgBox.classList.add("hidden");
        }

        callModal.classList.remove("hidden");
        modalOpen = true;
        playRingtone();

        console.log("Reminder modal opened");
    }

    function hideModal() {
        if (!callModal) return;
        callModal.classList.add("hidden");
        modalOpen = false;
        activeReminderId = null;
        stopRingtone();
        window.speechSynthesis.cancel();
    }

    async function markReminderDone() {
        if (!activeReminderId) return;
        try {
            await fetch("/mark-reminder-alerted/" + activeReminderId, {
                method: "POST"
            });
            console.log("Reminder marked alerted:", activeReminderId);
        } catch (e) {
            console.log("mark reminder failed", e);
        }
    }

    function speakText(text, langCode) {
        if (!("speechSynthesis" in window)) return;

        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);

        if (langCode === "hi") {
            utterance.lang = "hi-IN";
        } else if (langCode === "mr") {
            utterance.lang = "mr-IN";
        } else {
            utterance.lang = "en-US";
        }

        utterance.rate = 1;
        utterance.pitch = 1;
        utterance.volume = 1;

        try {
            window.speechSynthesis.speak(utterance);
        } catch (e) {
            console.log("speech failed", e);
        }
    }

    async function checkDueReminder() {
        if (modalOpen) return;

        try {
            const res = await fetch("/check-due-reminder?ts=" + Date.now(), {
                cache: "no-store"
            });

            const data = await res.json();
            console.log("Reminder API response:", data);

            if (data.due) {
                activeReminderId = data.id;
                showModal(data.medicine_name, data.message);
            }
        } catch (e) {
            console.log("check due reminder failed", e);
        }
    }

    if (receiveBtn) {
        receiveBtn.addEventListener("click", async function () {
            stopRingtone();

            if (msgBox) {
                msgBox.classList.remove("hidden");
            }

            speakText(spokenMessage.textContent, "{{ current_lang }}");
            await markReminderDone();

            setTimeout(function () {
                hideModal();
                location.reload();
            }, 2000);
        });
    }

    if (dismissBtn) {
        dismissBtn.addEventListener("click", async function () {
            await markReminderDone();
            hideModal();
            location.reload();
        });
    }

    setTimeout(checkDueReminder, 1000);
    setInterval(checkDueReminder, 5000);
})();
</script>
