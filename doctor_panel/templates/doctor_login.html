<!DOCTYPE html>
<html>
<head>
    <title>Doctor Login</title>
    <style>
        body{
            font-family:Arial;
            background:#eef3fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .card{
            background:white;
            padding:40px;
            border-radius:15px;
            width:350px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
        }
        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            border:1px solid #ccc;
        }
        button{
            width:100%;
            padding:12px;
            background:#1456d9;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Doctor Login</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
